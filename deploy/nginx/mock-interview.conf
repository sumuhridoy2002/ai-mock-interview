upstream nextjs {
    server 127.0.0.1:3000;
}

upstream laravel {
    server 127.0.0.1:8000;
}

upstream reverb {
    server 127.0.0.1:8080;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=10r/s;

server {
    listen 443 ssl http2;
    server_name mock-interview.example.com;

    ssl_certificate /etc/letsencrypt/live/mock-interview.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mock-interview.example.com/privkey.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://laravel;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /broadcasting {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://laravel;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /reverb {
        proxy_pass http://reverb;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}

# Internal AI service — firewall to localhost only
server {
    listen 127.0.0.1:8001;
    location / {
        limit_req zone=ai_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:8001;
    }
}
